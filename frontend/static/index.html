<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro AI Detective - Dim Edition</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background Layer -->
  <div class="bg-wrapper">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="crt-noise"></div>
  </div>

  <main class="ui-layer">
    <!-- Top HUD -->
    <header class="top-hud panel">
      <div class="left-hud">
        <span class="hud-icon" id="case-file-btn" style="cursor: pointer;">📁 CASE FILE</span>
      </div>
      <div class="center-hud">
        <span class="time-readout">TIME: <strong id="time-remaining-val">--</strong>H</span>
      </div>
      <div class="right-hud">
        <button id="restart-button-top" class="btn secondary">🔄 RESTART</button>
      </div>
    </header>

    <!-- Suspect Area -->
    <section class="suspect-panel" id="suspect-panel-container">
      <div class="actions-overlay">
        <button id="accuse-button" class="btn danger">⚖️ ACCUSE SUSPECT</button>
      </div>
    </section>

    <!-- Main Dialogue & Interaction -->
    <section class="bottom-hud">
      <div class="dialogue-box panel" id="terminal-output">
        <!-- Lines will be injected here -->
      </div>
      
      <form id="question-form" class="interaction-form panel">
        <div class="input-row">
          <label class="prompt-arrow">></label>
          <input type="text" id="question-input" autocomplete="off" placeholder="Type a question for the active suspect..." />
          <button type="submit" class="btn primary">ASK QUESTION</button>
        </div>
        
        <div class="quick-actions">
          <button type="button" class="btn secondary quick-btn" data-question="Where were you at the time of the murder?">📍 ALIBI</button>
          <button type="button" class="btn secondary quick-btn" data-question="What was your relationship with the victim?">💔 MOTIVE</button>
          <button type="button" class="btn secondary quick-btn" data-question="Did you see or hear anything unusual?">👀 WITNESS</button>
        </div>
      </form>
    </section>

  </main>
  
  <!-- Case File Modal -->
  <div id="case-modal" class="modal hidden">
    <div class="modal-content panel">
      <div class="modal-header">
        <h2 id="modal-title">INTERNAL CASE FILE</h2>
        <button id="close-modal" class="btn secondary">X</button>
      </div>
      <div class="modal-body">
        <div id="case-summary-content">Loading data...</div>
      </div>
    </div>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
